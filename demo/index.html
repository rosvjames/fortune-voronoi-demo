<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo de Fortune - Demo Interactiva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #F9FAFB;
            color: #111827;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Bar ─── */
        .top-bar {
            background: #FFF;
            border-bottom: 1px solid #E5E7EB;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            z-index: 10;
        }

        .top-bar h1 {
            font-size: 15px;
            font-weight: 700;
            color: #1F2937;
            margin-right: 12px;
            white-space: nowrap;
        }

        .separator {
            width: 1px;
            height: 24px;
            background: #D1D5DB;
            margin: 0 4px;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        button {
            font-size: 12px;
            padding: 5px 10px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            background: #FFF;
            color: #374151;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        button:hover {
            background: #F3F4F6;
            border-color: #9CA3AF;
        }
        button.primary {
            background: #2563EB;
            color: #FFF;
            border-color: #2563EB;
        }
        button.primary:hover {
            background: #1D4ED8;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #6B7280;
        }
        .toggle-group label {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            white-space: nowrap;
        }
        .toggle-group input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #2563EB;
        }

        #event-info {
            margin-left: auto;
            display: flex;
            gap: 12px;
            font-size: 11px;
            font-family: monospace;
            color: #6B7280;
        }
        .event-next { color: #EF4444; font-weight: 600; }
        .event-last { color: #059669; }
        .event-stats { color: #6B7280; }

        /* ─── Main Layout ─── */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── Canvas Panel ─── */
        .canvas-panel {
            flex: 1;
            position: relative;
            background: #FAFAFA;
        }
        #main-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 11px;
            color: #9CA3AF;
            pointer-events: none;
        }

        /* ─── Right Panel (Data Structures) ─── */
        .right-panel {
            width: 280px;
            min-width: 280px;
            background: #FFF;
            border-left: 1px solid #E5E7EB;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-section {
            padding: 12px;
            border-bottom: 1px solid #F3F4F6;
        }

        #bst-canvas {
            width: 100%;
            height: 220px;
            display: block;
        }

        /* ─── Queue Styles ─── */
        .queue-title {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
        }
        .queue-processed {
            font-size: 11px;
            color: #059669;
            background: #ECFDF5;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .queue-empty {
            font-size: 12px;
            color: #9CA3AF;
            font-style: italic;
            padding: 8px 0;
        }
        .queue-next-label {
            font-size: 11px;
            color: #EF4444;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .queue-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 3px;
            font-size: 11px;
            font-family: monospace;
            background: #F9FAFB;
            border: 1px solid #F3F4F6;
        }
        .queue-item.next {
            background: #FEF2F2;
            border-color: #FECACA;
        }
        .queue-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .queue-badge.site {
            background: #DBEAFE;
            color: #2563EB;
        }
        .queue-badge.circle {
            background: #EDE9FE;
            color: #8B5CF6;
        }
        .queue-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .queue-y {
            color: #9CA3AF;
            font-size: 10px;
            flex-shrink: 0;
        }
        .queue-more {
            font-size: 11px;
            color: #9CA3AF;
            padding: 4px 8px;
        }
        .queue-item.canceled {
            background: #F9FAFB;
            border-color: #E5E7EB;
            text-decoration: line-through;
            opacity: 0.5;
            color: #9CA3AF;
        }
        .queue-item.canceled .queue-label::after {
            content: ' (cancelado)';
            color: #9CA3AF;
            font-weight: 500;
            text-decoration: none;
            font-size: 9px;
        }
        .queue-badge.canceled {
            background: #F3F4F6 !important;
            color: #9CA3AF !important;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <h1>Algoritmo de Fortune</h1>

        <div class="separator"></div>

        <div class="btn-group">
            <button id="btn-clear">Limpiar</button>
            <button id="btn-random">Aleatorio</button>
        </div>

        <div class="separator"></div>

        <div class="btn-group">
            <button id="btn-preset-triangle">△ Triángulo</button>
            <button id="btn-preset-circle-event">○ Evento Círculo</button>
            <button id="btn-preset-collinear">― Colineal</button>
        </div>

        <div class="separator"></div>

        <div class="btn-group">
            <button id="btn-prev-event">◀ Prev</button>
            <button id="btn-auto-sweep" class="primary">▶ Auto</button>
            <button id="btn-next-event">Next ▶</button>
            <button id="btn-reset-sweep">↑ Reset</button>
        </div>

        <div class="separator"></div>

        <div class="toggle-group">
            <label><input type="checkbox" id="toggle-parabolas" checked> Parábolas</label>
            <label><input type="checkbox" id="toggle-beachline" checked> Beach Line</label>
            <label><input type="checkbox" id="toggle-edges" checked> Aristas</label>
            <label><input type="checkbox" id="toggle-circles" checked> Círculos</label>
        </div>

        <div id="event-info"></div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Canvas -->
        <div class="canvas-panel">
            <canvas id="main-canvas"></canvas>
            <div class="canvas-hint">Click: agregar sitio | Right-click: eliminar | Arrastra la línea roja | ↑↓: mover | N/P: siguiente/anterior evento</div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="panel-section">
                <canvas id="bst-canvas" width="256" height="220"></canvas>
            </div>
            <div class="panel-section" id="queue-container">
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
